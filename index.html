<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基金看板 · Fund Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=IBM+Plex+Sans+SC:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070a0f;
    --bg-2:#0c1118;
    --panel:#0e141d;
    --panel-2:#131b26;
    --line:#1d2733;
    --line-2:#283544;
    --ink:#e6edf3;
    --ink-dim:#8a98a8;
    --ink-faint:#566270;
    --up:#ff3b3b;       /* 红涨 */
    --up-soft:rgba(255,59,59,.14);
    --down:#19c37d;     /* 绿跌 */
    --down-soft:rgba(25,195,125,.14);
    --amber:#f5a623;
    --cyan:#36d6e7;
    --glow:0 0 0 1px var(--line);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:"IBM Plex Sans SC",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{
    min-height:100vh;
    background-image:
      radial-gradient(1100px 600px at 78% -8%, rgba(245,166,35,.07), transparent 60%),
      radial-gradient(900px 500px at 8% 0%, rgba(54,214,231,.05), transparent 55%),
      linear-gradient(180deg,#070a0f, #06080c 40%, #05070b);
    background-attachment:fixed;
  }
  /* faint grid texture */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size:46px 46px;
    mask-image:radial-gradient(circle at 50% 30%, #000 0%, transparent 90%);
  }
  .mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}
  .wrap{position:relative;z-index:1;max-width:1380px;margin:0 auto;padding:30px 26px 80px}

  /* ---------- masthead ---------- */
  header.mast{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;padding-bottom:22px;border-bottom:1px solid var(--line);margin-bottom:26px}
  .brand{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
  .ip-badge{width:100%;display:inline-flex;align-items:center;gap:8px;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin-bottom:2px}
  .ip-badge::before{content:"";width:26px;height:1px;background:var(--amber);box-shadow:0 0 10px rgba(245,166,35,.65)}
  .ip-badge b{font-family:"华文琥珀","站酷快乐体","幼圆","YouYuan","IBM Plex Sans SC",system-ui,sans-serif;font-size:20px;letter-spacing:.1em;font-weight:400;line-height:1;background:linear-gradient(135deg,#fff7d6 0%,var(--amber) 48%,#ff7a45 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 18px rgba(245,166,35,.36);transform:rotate(-2deg);display:inline-block}
  .brand h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(30px,4.4vw,46px);letter-spacing:-.5px;line-height:1}
  .brand h1 em{font-style:italic;font-weight:500;color:var(--amber)}
  .brand .sub{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--ink-faint);letter-spacing:.18em;text-transform:uppercase}
  .clock{text-align:right;font-family:"IBM Plex Mono",monospace}
  .clock .time{font-size:22px;letter-spacing:.04em}
  .clock .meta{font-size:11px;color:var(--ink-dim);letter-spacing:.14em;text-transform:uppercase;margin-top:3px;display:flex;gap:10px;justify-content:flex-end;align-items:center}
  .head-actions{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;justify-content:flex-end}
  .add-fund{text-align:left;min-width:260px}
  .add-fund form{display:flex;gap:6px;align-items:center;justify-content:flex-end}
  .add-fund input{width:112px;background:var(--panel);border:1px solid var(--line-2);border-radius:6px;color:var(--ink);font-family:"IBM Plex Mono",monospace;font-size:12px;padding:7px 9px;outline:none}
  .add-fund input:focus{border-color:var(--amber);box-shadow:0 0 0 1px rgba(245,166,35,.35)}
  .add-fund button{background:var(--amber);border:1px solid var(--amber);border-radius:6px;color:var(--bg);font-family:"IBM Plex Sans SC",system-ui,sans-serif;font-size:12px;font-weight:600;padding:7px 10px;cursor:pointer}
  .add-fund button:disabled{opacity:.55;cursor:not-allowed}
  .add-fund .msg{min-height:16px;margin-top:4px;font-size:10.5px;color:var(--ink-faint);text-align:right}
  .add-fund .msg.err{color:var(--down)}
  .add-fund .msg.ok{color:var(--up)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--down);box-shadow:0 0 8px var(--down);display:inline-block;animation:pulse 2s infinite}
  .dot.live{background:var(--up);box-shadow:0 0 8px var(--up)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ---------- fund cards ---------- */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(252px,1fr));gap:14px;margin-bottom:30px}
  .card{
    position:relative;background:linear-gradient(180deg,var(--panel),var(--bg-2));
    border:1px solid var(--line);border-radius:10px;padding:16px 16px 14px;cursor:pointer;
    transition:border-color .25s, transform .25s, box-shadow .25s;overflow:hidden;
  }
  .card::after{content:"";position:absolute;inset:0;border-radius:10px;pointer-events:none;
    background:linear-gradient(135deg,rgba(245,166,35,.0),rgba(245,166,35,.0));transition:background .3s}
  .card:hover{transform:translateY(-3px);border-color:var(--line-2)}
  .card.active{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber), 0 14px 40px -18px rgba(245,166,35,.5)}
  .card.active::after{background:linear-gradient(135deg,rgba(245,166,35,.10),transparent 60%)}
  .card .ftop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:12px}
  .card .fname{font-size:15px;font-weight:600;line-height:1.3}
  .card .fcode{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-faint);letter-spacing:.06em;margin-top:3px}
  .card .tag{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.1em;padding:3px 6px;border-radius:4px;border:1px solid var(--line-2);color:var(--ink-dim);text-transform:uppercase;white-space:nowrap}
  .card .tag.qdii{color:var(--cyan);border-color:rgba(54,214,231,.4)}
  .card .card-del{position:absolute;top:10px;right:10px;z-index:2;width:22px;height:22px;border:1px solid var(--line-2);border-radius:50%;background:rgba(7,10,15,.72);color:var(--ink-faint);font-family:"IBM Plex Mono",monospace;font-size:15px;line-height:18px;cursor:pointer;opacity:.55;transition:opacity .2s,color .2s,border-color .2s,background .2s}
  .card:hover .card-del,.card .card-del:focus{opacity:1;color:var(--ink);border-color:var(--amber);background:rgba(245,166,35,.12);outline:none}
  .card .row{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .card .est{font-family:"IBM Plex Mono",monospace;font-size:26px;font-weight:600;letter-spacing:.02em}
  .card .estlab{font-size:10px;color:var(--ink-faint);letter-spacing:.12em;text-transform:uppercase}
  .card .chg{font-family:"IBM Plex Mono",monospace;font-size:15px;font-weight:600}
  .card .foot{display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);font-size:11px;color:var(--ink-dim)}
  .card .foot b{color:var(--ink);font-weight:500}
  .pos{color:var(--up)}.neg{color:var(--down)}.flat{color:var(--ink-dim)}

  /* ---------- detail ---------- */
  .detail{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start}
  @media(max-width:980px){.detail{grid-template-columns:1fr}}
  .panel{background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .phead{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .phead .t{font-family:"Fraunces",serif;font-size:20px;font-weight:600}
  .phead .t small{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-faint);font-weight:400;margin-left:8px;letter-spacing:.06em}
  .phead .tools{display:flex;align-items:center;gap:10px;font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-dim)}
  .phead .tools .asof{color:var(--ink-faint)}

  /* holdings table */
  .tbl-wrap{overflow-x:auto}
  table.hold{width:100%;border-collapse:collapse;font-size:13px}
  table.hold th{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;text-align:right;padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.hold th.l{text-align:left}
  table.hold th.c{text-align:center}
  table.hold td{padding:11px 14px;border-bottom:1px solid rgba(29,39,51,.6);text-align:right;white-space:nowrap}
  table.hold td.l{text-align:left}
  table.hold td.c{text-align:center}
  table.hold tr:hover td{background:rgba(255,255,255,.02)}
  table.hold .rk{font-family:"IBM Plex Mono",monospace;color:var(--ink-faint);width:34px}
  table.hold .nm{font-weight:500}
  table.hold .nm small{display:block;font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--ink-faint);font-weight:400;margin-top:1px}
  table.hold .pctbar{position:relative;display:inline-block;min-width:48px;text-align:right}
  table.hold .price{font-family:"IBM Plex Mono",monospace}
  .chgcell{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:13.5px}
  .chgcell .arrow{font-size:10px;opacity:.7;margin-right:1px}
  .mkt{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.08em;padding:2px 5px;border-radius:3px;border:1px solid var(--line-2);color:var(--ink-faint)}
  .mkt.hk{color:var(--cyan);border-color:rgba(54,214,231,.35)}

  /* nav chart */
  .chartbox{padding:14px 16px 18px}
  .chartmeta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:12px;flex-wrap:wrap}
  .chartmeta .rng{display:flex;gap:4px}
  .chartmeta .rng button{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-dim);background:transparent;border:1px solid var(--line);padding:4px 9px;border-radius:5px;cursor:pointer;transition:.2s}
  .chartmeta .rng button:hover{color:var(--ink);border-color:var(--line-2)}
  .chartmeta .rng button.on{color:var(--bg);background:var(--amber);border-color:var(--amber)}
  #chart{width:100%;height:240px;display:block}
  .ttip{position:absolute;pointer-events:none;background:#05080c;border:1px solid var(--line-2);border-radius:6px;padding:7px 10px;font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink);opacity:0;transition:opacity .12s;transform:translate(-50%,-115%);white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .ttip b{color:var(--amber)}
  .chartstats{display:flex;gap:22px;margin-top:12px;flex-wrap:wrap}
  .chartstats .st{font-family:"IBM Plex Mono",monospace}
  .chartstats .st .k{font-size:10px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase}
  .chartstats .st .v{font-size:15px;font-weight:600;margin-top:2px}

  .empty{padding:46px 20px;text-align:center;color:var(--ink-faint);font-size:13px;line-height:1.7}
  .empty .big{font-family:"Fraunces",serif;font-style:italic;font-size:18px;color:var(--ink-dim);margin-bottom:6px}
  .loading{padding:40px 20px;text-align:center;color:var(--ink-faint);font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.1em}
  .loading::after{content:"";display:inline-block;width:8px;animation:dots 1.4s infinite}
  @keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}100%{content:""}}

  footer.foot-note{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-faint);line-height:1.8;font-family:"IBM Plex Mono",monospace}
  footer.foot-note b{color:var(--ink-dim)}

  @media(max-width:620px){
    .wrap{padding:20px 14px 60px}
    .brand h1{font-size:30px}
    .clock .time{font-size:17px}
    table.hold th.hide-m,table.hold td.hide-m{display:none}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="mast">
    <div class="brand">
      <div class="ip-badge">知识产权声明 · Developed by <b>林甲酸</b></div>
      <h1>基金<em>看板</em></h1>
      <span class="sub">Fund Terminal · 实时重仓监控</span>
    </div>
    <div class="head-actions">
      <div class="add-fund">
        <form id="addFundForm" autocomplete="off">
          <input id="addFundCode" class="mono" inputmode="numeric" pattern="\d{6}" maxlength="6" placeholder="基金代码" aria-label="基金代码">
          <button id="addFundBtn" type="submit">添加</button>
        </form>
        <div id="addFundStatus" class="msg" role="status" aria-live="polite"></div>
      </div>
      <div class="clock">
        <div class="time mono" id="clockTime">--:--:--</div>
        <div class="meta"><span class="dot" id="liveDot"></span><span id="liveState">SYNCING</span><span>·</span><span id="nextRefresh">下次刷新 --s</span></div>
      </div>
    </div>
  </header>

  <section class="cards" id="cards"></section>

  <section class="detail">
    <div class="panel">
      <div class="phead">
        <div class="t" id="holdTitle">前十大重仓股 <small id="holdSub"></small></div>
        <div class="tools"><span class="asof" id="holdAsOf"></span></div>
      </div>
      <div class="tbl-wrap">
        <div id="holdBody"><div class="loading">LOADING HOLDINGS</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="phead">
        <div class="t" id="navTitle">历史净值 <small id="navSub"></small></div>
        <div class="tools"><span class="asof" id="navCount"></span></div>
      </div>
      <div class="chartbox">
        <div class="chartmeta">
          <div class="rng" id="rangeBtns">
            <button data-r="1m">1月</button>
            <button data-r="3m">3月</button>
            <button data-r="6m" class="on">6月</button>
            <button data-r="1y">1年</button>
            <button data-r="all">全部</button>
          </div>
          <div class="mono" id="rangeLabel" style="font-size:11px;color:var(--ink-faint)"></div>
        </div>
        <div style="position:relative">
          <svg id="chart" viewBox="0 0 800 240" preserveAspectRatio="none"></svg>
          <div class="ttip mono" id="ttip"></div>
        </div>
        <div class="chartstats" id="chartStats"></div>
      </div>
    </div>
  </section>

  <footer class="foot-note">
    <b>数据来源</b>：东方财富 / 天天基金公开接口（fundgz · FundArchivesDatas · push2 · pingzhongdata）。<br>
    <b>说明</b>：实时估值为盘中估算值，非最终净值；重仓股为最新季报披露，涨幅为个股实时行情；红涨绿跌（A股惯例）。接口可能因 CORS 或变更而失效，刷新页面重试。
  </footer>
</div>

<script>
"use strict";
/* ============================== 基金配置 ============================== */
const FUNDS = [
  { code:"009993", name:"嘉实前沿创新混合", type:"混合" },
  { code:"017103", name:"大摩数字经济混合C", type:"混合" },
  { code:"019454", name:"华泰柏瑞中韩半导体ETF联接A", type:"QDII", qdii:true },
  { code:"019455", name:"华泰柏瑞中韩半导体ETF联接C", type:"QDII", qdii:true },
  { code:"004685", name:"金元顺安元启灵活配置", type:"混合" },
];

/* ============================== 自选基金持久化 ============================== */
const CUSTOM_FUNDS_KEY = "fundDashboard.customFunds.v1";
const HIDDEN_DEFAULT_CODES_KEY = "fundDashboard.hiddenDefaultCodes.v1";

function isValidFundCode(code){
  return /^\d{6}$/.test(String(code || "").trim());
}

function isDefaultFundCode(code){
  const clean = String(code || "").trim();
  return FUNDS.some(f => f.code === clean);
}

function normalizeStoredFund(f){
  if(!f || !isValidFundCode(f.code) || !f.name) return null;
  const name = String(f.name).trim();
  if(!name) return null;
  const out = { code:String(f.code).trim(), name, type:f.type || "基金" };
  if(f.qdii) out.qdii = true;
  return out;
}

function loadCustomFunds(){
  try{
    const raw = localStorage.getItem(CUSTOM_FUNDS_KEY);
    if(!raw) return [];
    const parsed = JSON.parse(raw);
    if(!Array.isArray(parsed)) return [];
    return parsed.map(normalizeStoredFund).filter(Boolean);
  }catch(e){ return []; }
}

function saveCustomFunds(funds){
  const clean = Array.isArray(funds) ? funds.map(normalizeStoredFund).filter(Boolean) : [];
  localStorage.setItem(CUSTOM_FUNDS_KEY, JSON.stringify(clean));
}

function normalizeHiddenDefaultCodes(codes){
  const seen = new Set();
  const clean = [];
  (Array.isArray(codes) ? codes : []).forEach(code => {
    const c = String(code || "").trim();
    if(!isValidFundCode(c) || !isDefaultFundCode(c) || seen.has(c)) return;
    seen.add(c);
    clean.push(c);
  });
  return clean;
}

function loadHiddenDefaultCodes(){
  try{
    const raw = localStorage.getItem(HIDDEN_DEFAULT_CODES_KEY);
    if(!raw) return [];
    const parsed = JSON.parse(raw);
    if(!Array.isArray(parsed)) return [];
    return normalizeHiddenDefaultCodes(parsed);
  }catch(e){ return []; }
}

function saveHiddenDefaultCodes(codes){
  localStorage.setItem(HIDDEN_DEFAULT_CODES_KEY, JSON.stringify(normalizeHiddenDefaultCodes(codes)));
}

function visibleDefaultFunds(){
  const hidden = new Set(loadHiddenDefaultCodes());
  return FUNDS.filter(f => !hidden.has(f.code));
}

function mergeFunds(defaultFunds, customFunds){
  const seen = new Set();
  const merged = [];
  [...defaultFunds, ...customFunds].forEach(f => {
    const code = String(f.code || "").trim();
    if(!isValidFundCode(code) || seen.has(code)) return;
    seen.add(code);
    merged.push({ ...f, code });
  });
  return merged;
}

function makeRuntimeFund(f){
  return { ...f, estimate:null, history:[], holdings:null, quotes:{} };
}

/* ============================== JSONP 工具 ============================== */
let _cbSeq = 0;
function jsonp(url, { globalVar=null, timeout=15000 } = {}) {
  return new Promise((resolve, reject) => {
    const cbName = "__jp_" + (_cbSeq++);
    const sep = url.includes("?") ? "&" : "?";
    const full = url + sep + "cb=" + cbName + "&_=" + Date.now();
    const script = document.createElement("script");
    let done = false, timer = null;
    const cleanup = () => {
      if (timer) clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };
    timer = setTimeout(() => { if(!done){ done=true; cleanup(); reject(new Error("jsonp timeout")); } }, timeout);
    window[cbName] = (data) => { if(done) return; done=true; cleanup(); resolve(data); };
    script.onerror = () => { if(done) return; done=true; cleanup(); reject(new Error("jsonp error")); };
    script.onload = () => {
      if(done) return;
      // script that sets a global var instead of calling cb
      if (globalVar && window[globalVar] !== undefined) {
        const d = window[globalVar];
        try { delete window[globalVar]; } catch(e){ window[globalVar] = undefined; }
        done = true; cleanup(); resolve(d);
      }
    };
    script.src = full;
    document.head.appendChild(script);
  });
}

/* load a script that defines a global var (pingzhongdata / apidata) */
function loadScriptVar(url, varName, timeout=20000){
  return new Promise((resolve,reject)=>{
    const script = document.createElement("script");
    let done=false, timer=setTimeout(()=>{if(!done){done=true;cleanup();reject(new Error("script timeout"));}},timeout);
    function cleanup(){ if(timer)clearTimeout(timer); if(script.parentNode)script.parentNode.removeChild(script); }
    script.onload = ()=>{ if(done)return; done=true; const d=window[varName]; try{delete window[varName];}catch(e){window[varName]=undefined;} cleanup(); resolve(d); };
    script.onerror = ()=>{ if(done)return; done=true; cleanup(); reject(new Error("script error")); };
    script.src = url;
    document.head.appendChild(script);
  });
}

/* ============================== 数据拉取 ============================== */
// 实时估值 fundgz（接口固定调用 jsonpgz(...)，不能使用动态 cb）
let _fundgzQueue = Promise.resolve();
async function fetchEstimate(code){
  _fundgzQueue = _fundgzQueue.catch(()=>{}).then(()=>loadFundgz(code));
  return _fundgzQueue;
}
function loadFundgz(code, timeout=15000){
  return new Promise((resolve,reject)=>{
    const script = document.createElement("script");
    const prev = window.jsonpgz;
    let done=false, timer=setTimeout(()=>{ if(!done){ done=true; cleanup(); reject(new Error("fundgz timeout")); } }, timeout);
    function cleanup(){
      if(timer) clearTimeout(timer);
      if(prev === undefined) { try{ delete window.jsonpgz; }catch(e){ window.jsonpgz = undefined; } }
      else window.jsonpgz = prev;
      if(script.parentNode) script.parentNode.removeChild(script);
    }
    window.jsonpgz = (data)=>{ if(done)return; done=true; cleanup(); resolve(data || null); };
    script.onerror = ()=>{ if(done)return; done=true; cleanup(); reject(new Error("fundgz error")); };
    script.src = `https://fundgz.1234567.com.cn/js/${code}.js?_=${Date.now()}`;
    document.head.appendChild(script);
  }).catch(()=>null);
}

// Pure tail of fetchCardEstimate: merge a fundgz estimate with the latest
// pingzhongdata history point. Extracted so the add path can compose the same
// card estimate from an already-fetched estimate + history without re-fetching.
function assembleCardEstimate(est, history, code, name){
  const p = history[history.length - 1];
  if(!p || !isFinite(p.y)) return est;
  const d = new Date(p.t);
  const jzrq = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  return { ...(est || {}), fundcode:code, name, jzrq, dwjz:p.y.toFixed(4), officialReturn:p.r, gsz:est?est.gsz:null, gszzl:est?est.gszzl:null, gztime:est?est.gztime:null };
}

async function fetchCardEstimate(code, name){
  const [est, history] = await Promise.all([fetchEstimate(code), fetchHistory(code)]);
  return assembleCardEstimate(est, history, code, name);
}

// pingzhongdata -> window.Data_netWorthTrend (history) + window.fS_name (name).
// Loaded once and returned together so callers needing both (the add path)
// don't trigger a second pingzhongdata request. Rejects when the script fails
// to load, preserving fetchHistory's existing rejection behavior for other
// flows; fS_name is read and reset to undefined after a successful load.
async function fetchPingzhong(code){
  const data = await loadScriptVar(`https://fund.eastmoney.com/pingzhongdata/${code}.js`, "Data_netWorthTrend");
  const history = Array.isArray(data) ? data.map(p => ({ t: p.x, y: +p.y, r: (p.equityReturn!=null?+p.equityReturn:null) })) : [];
  const name = window.fS_name || null;
  try{ delete window.fS_name; }catch(e){ window.fS_name = undefined; }
  return { history, name };
}

// 历史净值 pingzhongdata -> window.Data_netWorthTrend
async function fetchHistory(code){
  const pz = await fetchPingzhong(code);
  return pz.history;
}

// 基金名称兜底：pingzhongdata 同时会定义 window.fS_name。
// NOTE: the add path no longer uses this — it reads fS_name via fetchPingzhong
// in a single request. Kept for any caller needing name-only resolution.
async function fetchFundName(code){
  try{
    await loadScriptVar(`https://fund.eastmoney.com/pingzhongdata/${code}.js`, "Data_netWorthTrend");
    const name = window.fS_name;
    try{ delete window.fS_name; }catch(e){ window.fS_name = undefined; }
    return name || null;
  }catch(e){ return null; }
}

// 前十大重仓 FundArchivesDatas -> window.apidata.content (HTML)
async function fetchHoldings(code){
  const data = await loadScriptVar(
    `https://fundf10.eastmoney.com/FundArchivesDatas.aspx?type=jjcc&code=${code}&topline=10&year=${new Date().getFullYear()}&month=`,
    "apidata"
  );
  if(!data || !data.content) return { date:null, list:[] };
  return parseHoldings(data.content);

function parseHoldings(html){
  const doc = new DOMParser().parseFromString(html, "text/html");
  // report date
  let date = null;
  const dateFont = doc.querySelector("font.px12");
  if(dateFont) date = dateFont.textContent.trim();
  // first table = latest quarter
  const table = doc.querySelector("table");
  if(!table) return { date, list:[] };
  const rows = table.querySelectorAll("tbody tr");
  const list = [];
  rows.forEach(tr => {
    const tds = tr.querySelectorAll("td");
    if(tds.length < 5) return;
    // stock code link carries market: //quote.eastmoney.com/unify/r/{market}.{code}
    const codeLink = tds[1].querySelector("a");
    const nameLink = tds[2].querySelector("a") ;
    if(!codeLink) return;
    const href = codeLink.getAttribute("href") || "";
    const m = href.match(/unify\/r\/(\d+)\.([0-9A-Za-z]+)/);
    if(!m) return;
    const market = m[1], scode = m[2];
    const name = nameLink ? nameLink.textContent.trim() : scode;
    const ratio = tds[6] ? tds[6].textContent.trim() : "";
    list.push({ market, code:scode, name, ratio, secid: market+"."+scode });
  });
  return { date, list:list.slice(0,10) };
}

// 个股实时行情 stock/get
async function fetchQuote(secid){
  try{
    const d = await jsonp(`https://push2.eastmoney.com/api/qt/stock/get?secid=${secid}&fields=f43,f57,f58,f170,f169,f59`, {timeout:10000});
    const dd = d && d.data;
    if(!dd || dd.f43==null) return null;
    const dec = (dd.f59!=null ? dd.f59 : 2);
    const price = (+dd.f43) / Math.pow(10, dec);
    const pct = (dd.f170!=null ? +dd.f170 / 100 : null);
    return { price, pct, name: dd.f58 };
  }catch(e){ return null; }
}

  if(v==null || isNaN(v)) return "--";

}
function percentPointsToRatio(v){
  if(v==null || isNaN(v)) return null;
  return v / 100;
}
function cls(v){ if(v==null||isNaN(v)) return "flat"; return v>0?"pos":v<0?"neg":"flat"; }

/* ============================== 渲染：净值图 ============================== */
function renderChart(){
  const f = state.funds[state.active];
  const navTitle = document.getElementById("navTitle");
  const statsEl = document.getElementById("chartStats");
  const svg = document.getElementById("chart");
  if(!f){
    navTitle.textContent = "暂无基金";
    svg.innerHTML = `<text x="400" y="120" text-anchor="middle" fill="#566270" font-family="IBM Plex Mono" font-size="12">暂无基金</text>`;
    statsEl.innerHTML = "";
    document.getElementById("navCount").textContent = "";
    document.getElementById("rangeLabel").textContent = "";
    return;
  }
  navTitle.innerHTML = `${f.name} · 历史净值 <small>${f.code}</small>`;
  if(!f.history || f.history.length===0){
    svg.innerHTML = `<text x="400" y="120" text-anchor="middle" fill="#566270" font-family="IBM Plex Mono" font-size="12">LOADING HISTORY…</text>`;
    statsEl.innerHTML = "";
    document.getElementById("navCount").textContent = "";
    return;
  }
  // filter by range
  const now = Date.now();
  const spanMs = { "1m":30, "3m":90, "6m":182, "1y":365, "all":0 }[state.range];
  let pts = f.history;
  if(spanMs>0){
    const cutoff = now - spanMs*864e5;
    pts = pts.filter(p => p.t >= cutoff);
    if(pts.length < 2) pts = f.history; // fallback
  }
  document.getElementById("navCount").textContent = pts.length + " 个交易日";
  document.getElementById("rangeLabel").textContent =
    (pts.length? new Date(pts[0].t).toLocaleDateString("zh-CN") : "") +
    "  →  " + (pts.length? new Date(pts[pts.length-1].t).toLocaleDateString("zh-CN") : "");

  // stats
  const first = pts[0], last = pts[pts.length-1];
  const totalChg = first && last ? (last.y/first.y - 1) : null;
  const maxV = Math.max(...pts.map(p=>p.y));
  const minV = Math.min(...pts.map(p=>p.y));
  statsEl.innerHTML = `
    <div class="st"><div class="k">最新净值</div><div class="v mono">${last.y.toFixed(4)}</div></div>
    <div class="st"><div class="k">区间涨跌</div><div class="v mono ${cls(totalChg)}">${totalChg!=null?fmtPct(totalChg):"--"}</div></div>
    <div class="st"><div class="k">区间最高</div><div class="v mono">${maxV.toFixed(4)}</div></div>
    <div class="st"><div class="k">区间最低</div><div class="v mono">${minV.toFixed(4)}</div></div>
  `;

  drawChart(svg, pts);
}

function drawChart(svg, pts){
  const W=800, H=240, padL=8, padR=8, padT=16, padB=20;
  const w = W-padL-padR, h = H-padT-padB;
  const xs = pts.map(p=>p.t), ys = pts.map(p=>p.y);
  const xmin=Math.min(...xs), xmax=Math.max(...xs);
  const ymin=Math.min(...ys), ymax=Math.max(...ys);
  const xr = Math.max(1, xmax-xmin);
  const yr = Math.max(1e-9, ymax-ymin);
  const X = t => padL + (t-xmin)/xr * w;
  const Y = y => padT + (1-(y-ymin)/yr) * h;

  const up = pts.length>1 && last(pts).y >= pts[0].y;
  const col = up ? "var(--up)" : "var(--down)";
  const colHex = up ? "#ff3b3b" : "#19c37d";

  // line path
  let line = "";
  pts.forEach((p,i)=>{ line += (i===0?"M":"L") + X(p.t).toFixed(2) + "," + Y(p.y).toFixed(2) + " "; });
  const area = line + `L${X(xmax).toFixed(2)},${(padT+h).toFixed(2)} L${X(xmin).toFixed(2)},${(padT+h).toFixed(2)} Z`;

  // gridlines (4)
  let grid="";
  for(let i=0;i<=4;i++){ const y=padT + i/4*h; grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-width="1"/>`; }

  svg.innerHTML = `
    <defs>
      <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${colHex}" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="${colHex}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${grid}
    <path d="${area}" fill="url(#ag)"/>
    <path d="${line}" fill="none" stroke="${colHex}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    <circle id="cursorDot" r="3" fill="${colHex}" style="opacity:0"/>
  `;

  // hover
  const ttip = document.getElementById("ttip");
  const dot = svg.querySelector("#cursorDot");
  const rect = ()=>svg.getBoundingClientRect();
  svg.onmousemove = (e)=>{
    const r = rect();
    const px = (e.clientX - r.left) / r.width * W;
    // nearest point by x
    let bi=0, bd=1e18;
    pts.forEach((p,i)=>{ const d=Math.abs(X(p.t)-px); if(d<bd){bd=d;bi=i;} });
    const p = pts[bi];
    const cx = X(p.t), cy = Y(p.y);
    dot.setAttribute("cx", cx); dot.setAttribute("cy", cy); dot.style.opacity=1;
    const d = new Date(p.t);
    const dd = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const chg = p.r!=null ? `<span class="${cls(p.r/100)}">${fmtPct(p.r/100)}</span> · ` : "";
    ttip.innerHTML = `${dd} <b>${p.y.toFixed(4)}</b><br>${chg}净值`;
    ttip.style.opacity=1;
    ttip.style.left = (cx / W * r.width) + "px";
    ttip.style.top = (cy / H * r.height) + "px";
  };
  svg.onmouseleave = ()=>{ ttip.style.opacity=0; dot.style.opacity=0; };
}
function last(a){return a[a.length-1];}

function setAddFundStatus(message, kind=""){

async function addFundByCode(inputCode){
  const code = String(inputCode || "").trim();
  if(!isValidFundCode(code)) return { ok:false, message:"请输入 6 位基金代码", kind:"err" };
  if(state.funds.some(f => f.code === code)) return { ok:false, message:"基金已在看板中", kind:"err" };

  // Compose the card estimate from fundgz (estimate) + pingzhongdata
  // (history/name) in a single pingzhongdata request. pingzhongdata is
  // optional on the add path: if it fails, the fundgz estimate's name+gsz are
  // enough to add the fund (official dwjz/history can be absent).
  const [est, pz] = await Promise.all([
    fetchEstimate(code),
    fetchPingzhong(code).catch(() => ({ history: [], name: null })),
  ]);
  const name = (est && est.name) || pz.name;
  const estimate = assembleCardEstimate(est, pz.history, code, name);
  if(!estimate || (!estimate.dwjz && !estimate.gsz) || !name){
    return { ok:false, message:"未找到基金或接口不可用", kind:"err" };
  }

  const defaultFund = FUNDS.find(f => f.code === code);
  const storedFund = defaultFund ? { ...defaultFund, name } : { code, name, type:"基金" };
  if(defaultFund){
    saveHiddenDefaultCodes(loadHiddenDefaultCodes().filter(c => c !== code));
    const custom = loadCustomFunds();
    if(custom.some(f => f.code === code)) saveCustomFunds(custom.filter(f => f.code !== code));
  }else{
    const custom = loadCustomFunds().filter(f => f.code !== code);
    custom.push(storedFund);
    saveCustomFunds(custom);
  }

  const runtime = makeRuntimeFund(storedFund);
  runtime.estimate = { ...estimate, name };
  state.funds.push(runtime);
  state.active = state.funds.length - 1;
  renderCards();
  await loadActiveDetail();
  return { ok:true, message:"已添加 " + name, kind:"ok" };
}

function removeFundByCode(inputCode){
  const code = String(inputCode || "").trim();
  if(!isValidFundCode(code)) return { ok:false, message:"请输入 6 位基金代码", kind:"err" };

  const idx = state.funds.findIndex(f => f.code === code);
  if(idx < 0) return { ok:false, message:"基金不在看板中", kind:"err" };

  const removed = state.funds[idx];
  if(isDefaultFundCode(code)){
    saveHiddenDefaultCodes([...loadHiddenDefaultCodes(), code]);
    const custom = loadCustomFunds();
    if(custom.some(f => f.code === code)) saveCustomFunds(custom.filter(f => f.code !== code));
  }else{
    saveCustomFunds(loadCustomFunds().filter(f => f.code !== code));
  }

  state.funds.splice(idx, 1);
  if(state.funds.length === 0){
    state.active = 0;
  }else if(state.active > idx){
    state.active -= 1;
  }else if(state.active >= state.funds.length){
    state.active = state.funds.length - 1;
  }

  renderCards();
  renderDetail();
  return { ok:true, message:"已删除 " + removed.name, kind:"ok" };
}

function wireAddFundForm(){
  const form = document.getElementById("addFundForm");
  const input = document.getElementById("addFundCode");
  const btn = document.getElementById("addFundBtn");
  if(!form || !input || !btn) return;
  form.addEventListener("submit", async e=>{
    e.preventDefault();
    setAddFundStatus("正在添加...");
    btn.disabled = true;
    try{
      const result = await addFundByCode(input.value);
      setAddFundStatus(result.message, result.kind);
      if(result.ok) input.value = "";
    }catch(err){
      setAddFundStatus("未找到基金或接口不可用", "err");
    }finally{
      btn.disabled = false;
      input.focus();
    }
  });
}

async function loadAllEstimates(){
  await Promise.all(state.funds.map(async (f)=>{
    f.estimate = await fetchCardEstimate(f.code, f.name);
  }));
  renderCards();
  // active card estimate already in state
}

async function loadActiveDetail(){
  const f = state.funds[state.active];
  if(!f){
    renderDetail();
    return;
  }
  // history + holdings in parallel
  const hp = fetchHistory(f.code).then(d=>{ f.history=d; }).catch(()=>{ f.history=[]; });
  const hp2 = (async ()=>{
    if(f.qdii){ f.holdings = { date:null, list:[] }; return; }
    try{ f.holdings = await fetchHoldings(f.code); }
    catch(e){ f.holdings = { date:null, list:[] }; }
  })();
  await Promise.all([hp, hp2]);
  renderDetail();
  // then quotes
  refreshQuotes();
}

async function refreshQuotes(){
  const f = state.funds[state.active];
  if(!f || !f.holdings || !f.holdings.list || f.holdings.list.length===0) return;
  const list = f.holdings.list;
  await Promise.all(list.map(async s=>{
    const q = await fetchQuote(s.secid);
    if(q) f.quotes[s.secid] = q;
  }));
  renderHoldings();
}

/* ============================== 时钟 & 刷新 ============================== */
function tickClock(){
  const d = new Date();
  const pad = n=>String(n).padStart(2,"0");
  document.getElementById("clockTime").textContent =
    pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
  // trading hours: A-share 9:30-11:30,13:00-15:00 (weekday)
  const day = d.getDay();
  const mins = d.getHours()*60+d.getMinutes();
  const weekday = day>=1 && day<=5;
  const asOpen = weekday && ((mins>=570 && mins<=690) || (mins>=780 && mins<=900));
  const dot = document.getElementById("liveDot");
  const st = document.getElementById("liveState");
  if(asOpen){ dot.classList.add("live"); st.textContent="盘中 LIVE"; }
  else { dot.classList.remove("live"); st.textContent="休市"; }
}

let _nextAt = 0;
function scheduleNext(){
  _nextAt = Date.now() + 15000;
}
function tickCountdown(){
  const left = Math.max(0, Math.round((_nextAt - Date.now())/1000));
  document.getElementById("nextRefresh").textContent = "下次刷新 " + left + "s";
}

async function refreshLoop(){
  // refresh estimates + quotes
  await loadAllEstimates();
  await refreshQuotes();
  scheduleNext();
}

  renderCards();
  tickClock(); setInterval(tickClock, 1000);
  tickCountdown(); setInterval(tickCountdown, 1000);

  // range buttons
  document.getElementById("rangeBtns").addEventListener("click", e=>{
    const b = e.target.closest("button"); if(!b) return;
    state.range = b.dataset.r;
    [...document.querySelectorAll("#rangeBtns button")].forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    renderChart();
  });

  wireAddFundForm();

  await loadAllEstimates();
  await loadActiveDetail();

  scheduleNext();
  setInterval(async ()=>{
    if(Date.now() >= _nextAt){
      await refreshLoop();
    }
  }, 1000);
}
init();
</script>
